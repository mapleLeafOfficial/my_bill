name: Deploy Frontend

on:
  push:
    branches: [ main ] # 当代码推送到 main 分支时自动触发
  workflow_dispatch:   # 保留手动触发按钮，方便排查问题

concurrency:
  group: deploy-frontend
  cancel-in-progress: true # 如果有新提交，自动取消旧的构建任务

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 可根据你的项目实际 node 版本修改
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目产物
        env:
          # 注入你的 Supabase 环境变量供 Vite 打包时使用
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: 传输产物到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # 关键点：这里指定 source 为 dist 文件夹
          source: "dist"
          # 直接写死你的绝对路径
          target: "/home/theMX/docker_data/记账"
          # overwrite 为 true，直接覆盖旧的产物文件
          overwrite: true